services:
  - type: web
    name: jewellery-erp-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @erp/db run generate && pnpm --filter @erp/types run build && pnpm --filter @erp/db run build && pnpm --filter @erp/api run build
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
